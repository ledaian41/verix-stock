version: '3.8'

services:
  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verix-network

  worker:
    build: .
    entrypoint: [ "/verix-worker" ]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - verix-network

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: verix_stock
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d verix_stock" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - verix-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - verix-network

networks:
  verix-network:
    driver: bridge

volumes:
  postgres_data:
